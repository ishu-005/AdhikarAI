services:
  - type: web
    name: adhikarai-backend
    runtime: python
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    buildCommand: pip install -r requirements.txt
    pythonVersion: 3.11
    
    envVars:
      - key: GROQ_API_KEY
        scope: build,runtime
      - key: SUPABASE_URL
        scope: build,runtime
      - key: SUPABASE_API_KEY
        scope: build,runtime
      - key: SUPABASE_BUCKET_NAME
        value: pdfs
      - key: USE_SUPABASE
        value: "false"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: INFO
      - key: EMBEDDING_MODEL_FALLBACK
        value: "hashing-384-v1"
      - key: RERANKER_ENABLED
        value: "false"
    
    disk:
      name: chroma-storage
      path: /opt/render/chroma_store
      sizeGB: 1
    
    maxInstances: 1
    minInstances: 1
    plan: free
    
    # Health check configuration
    healthCheckPath: /api/health
    healthCheckInterval: 30
    
    # Free tier optimizations
    preDeployCommand: "echo 'Pre-deploy preparation complete'"
